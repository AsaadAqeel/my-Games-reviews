<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In / Sign Up - Checkpoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <meta name="theme-color" content="#0d1016">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="site-logo">Check<span>point</span></a>
      <div class="search-bar" role="search" style="display:none;"></div>
      <button type="button" id="nav-toggle" class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="main-nav">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav id="main-nav" class="main-nav" aria-label="Main navigation">
        <a href="index.html" class="main-nav__link">Home</a>
        <a href="games.html" class="main-nav__link">All Games</a>

      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-card__logo">Check<span>point</span></a>
      <p class="auth-card__subtitle">Track, review, and discover games</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tabs__tab auth-tabs__tab--active" data-tab="login" type="button">Sign In</button>
        <button class="auth-tabs__tab" data-tab="signup" type="button">Sign Up</button>
      </div>

      <!-- Sign In Form -->
      <form id="login-form" class="auth-form is-active" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
          <div class="form-error" id="login-email-error"></div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" required>
          <div class="form-error" id="login-password-error"></div>
        </div>
        <button type="submit" class="auth-form__submit" id="login-submit">Sign In</button>
        <div class="auth-message" id="login-message"></div>
      </form>

      <!-- Sign Up Form -->
      <form id="signup-form" class="auth-form" novalidate>
        <fieldset class="form-section">
          <legend class="form-section__legend">Public Profile</legend>
          <div class="form-group">
            <label for="signup-username">Username</label>
            <input type="text" id="signup-username" placeholder="Username" autocomplete="username" pattern="[a-zA-Z0-9_]+" maxlength="20" required>
            <div class="form-helper">This name will be displayed publicly on your reviews and lists.</div>
            <div class="form-error" id="signup-username-error"></div>
          </div>
        </fieldset>

        <fieldset class="form-section">
          <legend class="form-section__legend">Account Details (Private)</legend>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
            <div class="form-error" id="signup-email-error"></div>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" required>
            <div class="form-error" id="signup-password-error"></div>
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" required>
            <div class="form-error" id="signup-confirm-error"></div>
          </div>
        </fieldset>

        <button type="submit" class="auth-form__submit" id="signup-submit">Create Account</button>
        <div class="auth-message" id="signup-message"></div>
      </form>

      <!-- Logged-in state -->
      <div id="logged-in-view" class="auth-logged-in" style="display:none;">
        <p style="color:var(--text-muted);margin-bottom:0.5rem;">You are signed in as</p>
        <p class="auth-logged-in__email" id="logged-in-email"></p>
        <button type="button" class="auth-logged-in__btn" id="sign-out-btn">Sign Out</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <a href="index.html" class="footer-logo">CHECKPOINT</a>
      <p>Game data powered by <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">RAWG</a></p>
    </div>
  </footer>

  <script type="module">
    import { supabase } from "./js/supabase-client.js";

    // --- DOM refs ---
    const tabs          = document.querySelectorAll(".auth-tabs__tab");
    const loginForm     = document.getElementById("login-form");
    const signupForm    = document.getElementById("signup-form");
    const loggedInView  = document.getElementById("logged-in-view");
    const loggedInEmail = document.getElementById("logged-in-email");
    const signOutBtn    = document.getElementById("sign-out-btn");

    // --- Tab switching ---
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("auth-tabs__tab--active"));
        tab.classList.add("auth-tabs__tab--active");

        const target = tab.dataset.tab;
        loginForm.classList.toggle("is-active", target === "login");
        signupForm.classList.toggle("is-active", target === "signup");

        clearMessages();
      });
    });

    // --- Open tab from URL query param ---
    const initialTab = new URLSearchParams(location.search).get("tab");
    if (initialTab === "signup") {
      document.querySelector('.auth-tabs__tab[data-tab="signup"]')?.click();
    }

    // --- Validation helpers ---
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showError(inputId, errorId, message) {
      const errorEl = document.getElementById(errorId);
      errorEl.textContent = message;
      errorEl.classList.add("visible");
    }

    function clearError(errorId) {
      const errorEl = document.getElementById(errorId);
      errorEl.classList.remove("visible");
      errorEl.textContent = "";
    }

    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = "auth-message visible auth-message--" + type;
    }

    function clearMessages() {
      document.querySelectorAll(".auth-message").forEach(m => {
        m.classList.remove("visible");
        m.textContent = "";
      });
      document.querySelectorAll(".form-error").forEach(e => {
        e.classList.remove("visible");
        e.textContent = "";
      });
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? "Please wait..." : btn.dataset.originalText || btn.textContent;
    }

    // Save original button text
    document.getElementById("login-submit").dataset.originalText = "Sign In";
    document.getElementById("signup-submit").dataset.originalText = "Create Account";

    // --- Login ---
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      let hasError = false;

      if (!email || !isValidEmail(email)) {
        showError("login-email", "login-email-error", "Please enter a valid email address.");
        hasError = true;
      } else {
        clearError("login-email-error");
      }

      if (!password) {
        showError("login-password", "login-password-error", "Password is required.");
        hasError = true;
      } else {
        clearError("login-password-error");
      }

      if (hasError) return;

      setLoading("login-submit", true);

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      setLoading("login-submit", false);

      if (error) {
        showMessage("login-message", error.message, "error");
        return;
      }

      showMessage("login-message", "Signed in successfully!", "success");
    });

    // --- Signup ---
    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      const username = document.getElementById("signup-username").value.trim();
      const email    = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const confirm  = document.getElementById("signup-confirm").value;

      let hasError = false;

      if (!username) {
        showError("signup-username", "signup-username-error", "Username is required.");
        hasError = true;
      } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError("signup-username", "signup-username-error", "Only letters, numbers, and underscores allowed.");
        hasError = true;
      } else if (username.length > 20) {
        showError("signup-username", "signup-username-error", "Username must be 20 characters or less.");
        hasError = true;
      } else {
        clearError("signup-username-error");
      }

      if (!email || !isValidEmail(email)) {
        showError("signup-email", "signup-email-error", "Please enter a valid email address.");
        hasError = true;
      } else {
        clearError("signup-email-error");
      }

      if (!password || password.length < 6) {
        showError("signup-password", "signup-password-error", "Password must be at least 6 characters.");
        hasError = true;
      } else {
        clearError("signup-password-error");
      }

      if (password !== confirm) {
        showError("signup-confirm", "signup-confirm-error", "Passwords do not match.");
        hasError = true;
      } else {
        clearError("signup-confirm-error");
      }

      if (hasError) return;

      setLoading("signup-submit", true);

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            username
          }
        }
      });

      setLoading("signup-submit", false);

      if (error) {
        showMessage("signup-message", error.message, "error");
        return;
      }

      if (data.user && data.user.identities && data.user.identities.length === 0) {
        showMessage("signup-message", "An account with this email already exists.", "error");
        return;
      }

      showMessage("signup-message", "Account created! Check your email to confirm.", "success");
    });

    // --- Sign out ---
    signOutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
    });

    // --- Auth state listener ---
    supabase.auth.onAuthStateChange((event, session) => {
      console.log("Auth event:", event);

      if (session) {
        console.log("User:", session.user.email);
        loginForm.style.display = "none";
        signupForm.style.display = "none";
        document.querySelector(".auth-tabs").style.display = "none";
        loggedInView.style.display = "block";
        loggedInEmail.textContent = session.user.email;
      } else {
        console.log("No active session");
        loginForm.style.display = "";
        signupForm.style.display = "";
        document.querySelector(".auth-tabs").style.display = "";
        loggedInView.style.display = "none";

        // Restore correct active tab
        const activeTab = document.querySelector(".auth-tabs__tab--active");
        if (activeTab) {
          const target = activeTab.dataset.tab;
          loginForm.classList.toggle("is-active", target === "login");
          signupForm.classList.toggle("is-active", target === "signup");
        }
      }
    });

    // --- Check initial session ---
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      loginForm.style.display = "none";
      signupForm.style.display = "none";
      document.querySelector(".auth-tabs").style.display = "none";
      loggedInView.style.display = "block";
      loggedInEmail.textContent = session.user.email;
    }

    // --- Mobile nav toggle ---
    const navToggle = document.getElementById("nav-toggle");
    const mainNav   = document.getElementById("main-nav");
    navToggle.addEventListener("click", () => {
      const expanded = navToggle.getAttribute("aria-expanded") === "true";
      navToggle.setAttribute("aria-expanded", String(!expanded));
      mainNav.classList.toggle("is-open");
    });
  </script>
</body>
</html>
