<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All games - Checkpoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#141417">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="site-logo">Check<span>point</span></a>
      <div class="search-bar" role="search">
        <label for="search-input" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Search games</label>
        <input type="search" id="search-input" placeholder="Search games..." autocomplete="off">
        <button type="button" id="search-btn" aria-label="Search">Search</button>
      </div>
      <button type="button" id="nav-toggle" class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="main-nav">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav id="main-nav" class="main-nav" aria-label="Main navigation">
        <a href="index.html" class="main-nav__link">Home</a>
        <a href="games.html" class="main-nav__link">All Games</a>
        <a href="played.html" class="main-nav__link">Played</a>
        <a href="favorites.html" class="main-nav__link">Favorites</a>
        <a href="lists.html" class="main-nav__link">Lists</a>
        <a href="my-reviews.html" class="main-nav__link">My Reviews</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="filters" role="toolbar" aria-label="Filter and sort games">
      <select id="genre-filter" aria-label="Filter by genre">
        <option value="">All Genres</option>
      </select>
      <select id="platform-filter" aria-label="Filter by platform">
        <option value="">All Platforms</option>
      </select>
      <select id="sort-select" aria-label="Sort games">
        <option value="-rating">Top Rated</option>
        <option value="-released">Newest</option>
        <option value="released">Oldest</option>
        <option value="name">Name A-Z</option>
        <option value="-name">Name Z-A</option>
        <option value="-added">Most Popular</option>
      </select>
      <button type="button" class="filters__reset" id="filters-reset" aria-label="Reset all filters">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset
      </button>
    </div>

    <div id="game-grid" class="game-grid" aria-live="polite">
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-card__image skeleton"></div><div class="skeleton-card__body"><div class="skeleton-card__line skeleton"></div><div class="skeleton-card__line skeleton skeleton-card__line--short"></div><div class="skeleton-card__line skeleton skeleton-card__line--xs"></div></div></div>
    </div>
    <div id="status-message"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <footer>
    <div class="container">
      <p>Game data powered by <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">RAWG</a> &mdash; <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">https://rawg.io</a></p>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
