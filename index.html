<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint - Game Reviews &amp; Ratings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <meta name="theme-color" content="#141417">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="site-logo">Check<span>point</span></a>
      <div class="search-bar" role="search">
        <label for="search-input" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Search games</label>
        <input type="search" id="search-input" placeholder="Search games..." autocomplete="off">
        <button type="button" id="search-btn" aria-label="Search"><span class="search-btn__text">Search</span><svg class="search-btn__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      </div>
      <button type="button" id="nav-toggle" class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="main-nav">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav id="main-nav" class="main-nav" aria-label="Main navigation">
        <a href="index.html" class="main-nav__link">Home</a>
        <a href="games.html" class="main-nav__link">All Games</a>
        <a href="played.html" class="main-nav__link">Played</a>
        <a href="favorites.html" class="main-nav__link">Favorites</a>
        <a href="lists.html" class="main-nav__link">Lists</a>
        <a href="my-reviews.html" class="main-nav__link">My Reviews</a>
        <div id="auth-user-badge" class="auth-user-badge" style="display:none;">
          <button type="button" class="auth-user-badge__trigger" aria-haspopup="true" aria-expanded="false">
            <span class="auth-user-badge__avatar">👤</span>
            <span class="auth-user-badge__name profile-name-display"></span>
          </button>
          <div class="profile-dropdown">
            <a href="my-reviews.html" class="profile-dropdown__item">My Profile</a>
            <a href="settings.html" class="profile-dropdown__item">Settings</a>
            <button type="button" class="profile-dropdown__item profile-dropdown__item--signout" data-auth-signout>Sign Out</button>
          </div>
        </div>
        <a href="auth.html" class="main-nav__auth">Sign up</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Featured Hero Banner -->
    <div id="featured-hero" class="featured-hero" aria-label="Featured game">
      <div class="featured-hero__placeholder">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Recommendations Section -->
    <section id="recommendations-section" class="curated-section">
      <div class="curated-section__header">
        <h2 class="curated-section__title">Recommended for you</h2>
        <div class="curated-section__arrows">
          <button class="curated-section__arrow" data-dir="-1" aria-label="Scroll left" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="curated-section__arrow" data-dir="1" aria-label="Scroll right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <button class="recommendations-refresh" type="button" aria-label="Refresh recommendations" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        </button>
      </div>
      <div class="curated-grid" data-grid="recommendations">
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
      </div>
    </section>

    <!-- Top Rated Section -->
    <section class="curated-section">
      <div class="curated-section__header">
        <h2 class="curated-section__title">Top rated</h2>
        <div class="curated-section__arrows">
          <button class="curated-section__arrow" data-dir="-1" aria-label="Scroll left" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="curated-section__arrow" data-dir="1" aria-label="Scroll right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="curated-grid" data-grid="top-rated">
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
      </div>
    </section>

    <!-- Popular Section -->
    <section class="curated-section">
      <div class="curated-section__header">
        <h2 class="curated-section__title">Popular</h2>
        <div class="curated-section__arrows">
          <button class="curated-section__arrow" data-dir="-1" aria-label="Scroll left" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="curated-section__arrow" data-dir="1" aria-label="Scroll right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="curated-grid" data-grid="popular">
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
        <div class="skeleton-shelf-card"><div class="skeleton-shelf-card__image"></div><div class="skeleton-shelf-card__body"><div class="skeleton-shelf-card__line"></div><div class="skeleton-shelf-card__line skeleton-shelf-card__line--short"></div></div></div>
      </div>
    </section>

    <div class="curated-cta">
      <a href="#" id="all-games-btn" class="all-games-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z" fill="currentColor"/></svg>
        All games
      </a>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Game data powered by <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">RAWG</a> &mdash; <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">https://rawg.io</a></p>
    </div>
  </footer>

  <script type="module" src="js/auth-guard.js?v=2.0"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    setTimeout(function () {
      if (!window.__checkpointBooted) {
        var hero = document.getElementById("featured-hero");
        if (hero) {
          hero.innerHTML = "";
          var wrapper = document.createElement("div");
          wrapper.style.textAlign = "center";
          wrapper.style.padding = "3rem 1rem";

          var msg = document.createElement("p");
          msg.textContent = "Something went wrong while loading Checkpoint. Please refresh the page. If it keeps happening, try again later.";
          msg.style.marginBottom = "1rem";

          var btn = document.createElement("button");
          btn.textContent = "Refresh";
          btn.style.padding = "0.6rem 1.4rem";
          btn.style.fontSize = "1rem";
          btn.style.cursor = "pointer";
          btn.addEventListener("click", function () { location.reload(); });

          wrapper.appendChild(msg);
          wrapper.appendChild(btn);
          hero.appendChild(wrapper);
        }
      }
    }, 6000);
  </script>
</body>
</html>
