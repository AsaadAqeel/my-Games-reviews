<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Checkpoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <meta name="theme-color" content="#0d1016">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="site-logo">Check<span>point</span></a>
      <div class="search-bar" role="search">
        <label for="search-input" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Search games</label>
        <input type="search" id="search-input" placeholder="Search games" autocomplete="off">
        <button type="button" id="search-clear" class="search-clear" aria-label="Clear search" style="display:none;">&times;</button>
        <button type="button" id="search-btn" class="search-btn" aria-label="Search"><svg class="search-btn__icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      </div>
      <button type="button" id="nav-toggle" class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="main-nav">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav id="main-nav" class="main-nav" aria-label="Main navigation">
        <a href="index.html" class="main-nav__link">Home</a>
        <a href="games.html" class="main-nav__link">All Games</a>

        <div id="auth-user-badge" class="auth-user-badge" style="display:none;">
          <button type="button" class="auth-user-badge__trigger" aria-haspopup="true" aria-expanded="false">
            <span class="auth-user-badge__avatar"></span>
            <span class="auth-user-badge__name profile-name-display"></span>
          </button>
          <div class="profile-dropdown">
            <a href="profile.html" class="profile-dropdown__item">My Profile</a>
            <a href="settings.html" class="profile-dropdown__item">Settings</a>
            <button type="button" class="profile-dropdown__item profile-dropdown__item--signout" data-auth-signout>Sign Out</button>
          </div>
        </div>
        <a href="auth.html" class="main-nav__auth">Sign up</a>
      </nav>
    </div>
  </header>

  <main class="container profile-content">

    <!-- Guest Prompt -->
    <div class="guest-prompt" data-auth="guest">
      <svg class="guest-prompt__icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <h2 class="guest-prompt__title">Sign in to view your profile</h2>
      <p class="guest-prompt__text">Log in or create an account to see your gaming stats, reviews, and activity.</p>
      <div class="guest-prompt__actions">
        <a href="auth.html" class="guest-prompt__btn guest-prompt__btn--primary">Log in</a>
        <a href="auth.html?tab=signup" class="guest-prompt__btn guest-prompt__btn--ghost">Sign up</a>
      </div>
    </div>

    <!-- Profile Page -->
    <div class="profile-page">

      <!-- Header: Avatar + Username -->
      <div class="profile-avatar">
        <div class="profile-avatar__inner">
          <img
            class="profile-avatar__img"
            src="https://api.dicebear.com/9.x/avataaars/svg?seed=Checkpoint&backgroundColor=b6e3f4"
            alt="Profile avatar"
          />
        </div>
      </div>
      <h1 class="profile-username profile-name-display" id="profile-username">Username</h1>
      <p class="profile-joined" id="profile-joined">Joined January 2024</p>

      <!-- Stats Section -->
      <div class="profile-stats">
        <a href="played.html" class="profile-stat-row" id="played-link" aria-label="Played games">
          <span class="profile-stat-row__label">Played</span>
          <span class="profile-stat-row__value" id="played-count">--</span>
          <svg class="profile-stat-row__arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a href="favorites.html" class="profile-stat-row" id="favorite-link" aria-label="Favorite games">
          <span class="profile-stat-row__label">Favorite</span>
          <span class="profile-stat-row__value" id="favorite-count">--</span>
          <svg class="profile-stat-row__arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a href="lists.html" class="profile-stat-row" id="lists-link" aria-label="Game lists">
          <span class="profile-stat-row__label">Lists</span>
          <span class="profile-stat-row__value" id="lists-count">--</span>
          <svg class="profile-stat-row__arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a href="diary.html" class="profile-stat-row" id="diary-link" aria-label="Game diary">
          <span class="profile-stat-row__label">Diary</span>
          <span class="profile-stat-row__value" id="diary-count">--</span>
          <svg class="profile-stat-row__arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a href="my-reviews.html" class="profile-stat-row" id="reviews-link" aria-label="User reviews">
          <span class="profile-stat-row__label">Reviews</span>
          <span class="profile-stat-row__value" id="reviews-count">--</span>
          <svg class="profile-stat-row__arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>

    </div>

  </main>

  <footer>
    <div class="container">
      <a href="index.html" class="footer-logo">CHECKPOINT</a>
      <p>Game data powered by <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">RAWG</a></p>
    </div>
  </footer>

  <script src="js/profile-menu.js?v=1" defer></script>
  <script type="module" src="js/auth-guard.js?v=4.1"></script>
  <script type="module" src="js/app.js?v=4.0"></script>
  <script type="module">
    import { initAvatar } from "./js/avatar.js";
    initAvatar();
  </script>
  <script type="module" src="js/profile-stats.js?v=1"></script>
</body>
</html>
